<style>
  :root{
    --paper:#e3d3ac; --panel:#efe4c9; --panel-2:#e7d9ba;
    --ink:#2a2520; --ink-soft:#6b6153; --line:rgba(42,37,32,.16); --line-2:rgba(42,37,32,.30);
    --c-jade:#3f7d6e; --c-iron:#454d61; --c-amber:#b07a1e; --c-rose:#c26a82;
    --c-crim:#a23b34; --c-purple:#6b4a86; --gold:#c8962e; --cinnabar:#b23a2e;
    --stage-edge:#7c6a49; --shadow:0 2px 6px rgba(42,37,32,.26);
    --disp:"Songti SC","STSong","Source Han Serif SC","Noto Serif CJK SC","SimSun",serif;
    --ui:"PingFang SC","Source Han Sans SC","Noto Sans CJK SC","Microsoft JhengHei","Microsoft YaHei",sans-serif;
    --mono:"SFMono-Regular",ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#3a352c; --panel:#1c1a15; --panel-2:#232019;
      --ink:#ede3cd; --ink-soft:#a89e88; --line:rgba(237,227,205,.12); --line-2:rgba(237,227,205,.24);
      --stage-edge:#3a3226; --shadow:0 3px 10px rgba(0,0,0,.5);
    }
  }
  :root[data-theme="light"]{
    --paper:#e3d3ac; --panel:#efe4c9; --panel-2:#e7d9ba;
    --ink:#2a2520; --ink-soft:#6b6153; --line:rgba(42,37,32,.16); --line-2:rgba(42,37,32,.30);
    --stage-edge:#7c6a49; --shadow:0 2px 6px rgba(42,37,32,.26);
  }
  :root[data-theme="dark"]{
    --paper:#3a352c; --panel:#1c1a15; --panel-2:#232019;
    --ink:#ede3cd; --ink-soft:#a89e88; --line:rgba(237,227,205,.12); --line-2:rgba(237,227,205,.24);
    --stage-edge:#3a3226; --shadow:0 3px 10px rgba(0,0,0,.5);
  }

  *{box-sizing:border-box}
  .jh{
    font-family:var(--ui); color:var(--ink);
    background:radial-gradient(120% 120% at 50% -10%, color-mix(in srgb,var(--panel) 72%,transparent), transparent 60%), var(--panel-2);
    min-height:100%; padding:clamp(14px,2.4vw,30px); line-height:1.55; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1180px; margin:0 auto; display:flex; flex-direction:column; gap:16px}

  .head{display:flex; flex-wrap:wrap; align-items:flex-end; gap:8px 22px; border-bottom:1px solid var(--line-2); padding-bottom:14px}
  .title{font-family:var(--disp); font-weight:600; letter-spacing:.05em; font-size:clamp(25px,4vw,42px); line-height:1.06; text-wrap:balance; margin:0}
  .title .sub{display:block; font-family:var(--ui); font-weight:600; letter-spacing:.3em; font-size:11px; color:var(--gold); margin-bottom:7px}
  .kicker{font-family:var(--disp); font-size:15px; color:var(--ink-soft); max-width:44ch; margin:0 0 0 auto}
  .kicker b{color:var(--cinnabar); font-weight:600}

  .board-row{display:grid; grid-template-columns:minmax(0,1fr) 322px; gap:16px; align-items:start}
  @media(max-width:880px){ .board-row{grid-template-columns:1fr} }

  .stagewrap{position:relative; border:1px solid var(--stage-edge); border-radius:11px; box-shadow:var(--shadow); line-height:0}
  .stagewrap::after{content:""; position:absolute; inset:0; pointer-events:none; border-radius:10px;
    background:radial-gradient(130% 100% at 50% 38%, transparent 55%, rgba(20,14,6,.30)); mix-blend-mode:multiply}
  canvas.board{display:block; border-radius:10px}
  .layer{position:absolute; inset:0; pointer-events:none; line-height:1.55}

  .piece{position:absolute; left:0; top:0; z-index:5;
    transition:transform .6s cubic-bezier(.5,.05,.3,1); will-change:transform}
  .stone{width:100%; height:100%; border-radius:50%; display:grid; place-items:center; position:relative;
    font-family:var(--disp); font-weight:600; color:#fbf4e3;
    box-shadow:0 3px 5px rgba(0,0,0,.4), inset 0 2px 3px rgba(255,255,255,.32), inset 0 -3px 5px rgba(0,0,0,.32);
    text-shadow:0 1px 1px rgba(0,0,0,.55); transition:transform .5s, filter .5s, opacity .5s}
  .piece.idle .stone{animation:bob 2.6s ease-in-out infinite}
  @keyframes bob{50%{transform:translateY(-2px)}}
  .stone .halo{position:absolute; inset:-3px; border-radius:50%; border:2px solid rgba(255,244,220,.7); opacity:0; transition:opacity .25s}
  .piece.talk .stone .halo{opacity:1}
  .stone .crack{position:absolute; inset:0; border-radius:50%; box-shadow:inset 0 0 0 2px var(--cinnabar); opacity:0; transition:opacity .3s}
  .piece.hurt2 .stone .crack{opacity:.95}
  .piece.hurt1 .stone{box-shadow:0 3px 5px rgba(0,0,0,.4), inset 0 0 0 2px color-mix(in srgb,var(--gold) 70%,transparent), inset 0 -3px 5px rgba(0,0,0,.32)}
  .piece.dead{z-index:2}
  .piece.dead .stone{filter:grayscale(.85) brightness(.68); opacity:.7; transform:rotate(68deg) scale(.9)}
  .stone .fallen{position:absolute; top:-3px; right:-3px; font-size:.66em; opacity:0}
  .piece.dead .stone .fallen{opacity:1}
  .piece.shaking .stone{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translate(0,0)}25%{transform:translate(2px,-1px)}50%{transform:translate(-2px,1px)}75%{transform:translate(1px,1px)}}

  .bubble{position:absolute; left:0; top:0; max-width:188px; transform:translate(-50%,-100%);
    background:var(--panel); color:var(--ink); border:1px solid var(--line-2); border-radius:9px; padding:6px 10px;
    font-family:var(--ui); font-size:12.5px; line-height:1.42; box-shadow:var(--shadow); z-index:9; animation:pop .24s ease-out}
  .bubble b{font-weight:600; font-family:var(--disp)}
  .bubble::after{content:""; position:absolute; left:50%; bottom:-7px; transform:translateX(-50%); border:7px solid transparent; border-top-color:var(--panel)}
  .bubble.below{transform:translate(-50%,0)}
  .bubble.below::after{bottom:auto; top:-7px; border-top-color:transparent; border-bottom-color:var(--panel)}
  @keyframes pop{from{opacity:0; transform:translate(-50%,-90%) scale(.92)} to{opacity:1}}

  .prop{position:absolute; transform:translate(-50%,-50%); z-index:3}
  .lantern{width:9px; height:12px; border-radius:50% 50% 45% 45%; background:radial-gradient(circle at 40% 35%,#ffd47a,var(--cinnabar)); box-shadow:0 0 8px 2px rgba(200,60,40,.5); animation:flick 1.8s ease-in-out infinite}
  .basin{width:15px; height:15px; border-radius:50%; background:radial-gradient(circle at 38% 32%,#ffe9a8,var(--gold)); box-shadow:0 0 10px 3px rgba(200,150,46,.55); animation:glint 3s ease-in-out infinite}
  @keyframes flick{50%{opacity:.62}}
  @keyframes glint{50%{box-shadow:0 0 17px 5px rgba(220,180,80,.85)}}

  .slash{position:absolute; left:0; top:0; height:3px; transform-origin:left center; z-index:8;
    background:linear-gradient(90deg,transparent,var(--cinnabar),#fff,var(--cinnabar),transparent); box-shadow:0 0 8px var(--cinnabar); animation:slashfx .46s ease-out forwards}
  @keyframes slashfx{0%{opacity:0; filter:brightness(2.2)}30%{opacity:1}100%{opacity:0}}
  .flash{position:absolute; inset:0; z-index:7; pointer-events:none; opacity:0; border-radius:10px; background:radial-gradient(circle,rgba(178,58,46,.32),transparent 62%)}
  .flash.on{animation:flashfx .5s ease-out}
  @keyframes flashfx{from{opacity:1}to{opacity:0}}

  .side{display:flex; flex-direction:column; gap:14px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; box-shadow:var(--shadow)}
  .card h3{margin:0; padding:10px 13px; font-size:11px; font-weight:700; letter-spacing:.2em; color:var(--ink-soft); border-bottom:1px solid var(--line); font-family:var(--ui)}
  .card .body{padding:5px 8px; max-height:288px; overflow-y:auto}

  .roster{list-style:none; margin:0; padding:0}
  .roster li{display:flex; gap:9px; align-items:center; padding:7px 6px}
  .roster li+li{border-top:1px solid var(--line)}
  .stone-mini{flex:none; width:30px; height:30px; border-radius:50%; display:grid; place-items:center; font-family:var(--disp); font-weight:600; color:#fbf4e3; font-size:16px; box-shadow:inset 0 1px 2px rgba(255,255,255,.32), inset 0 -2px 3px rgba(0,0,0,.32); text-shadow:0 1px 1px rgba(0,0,0,.5)}
  .rname{font-weight:600; font-size:14px; font-family:var(--disp)}
  .rmeta{font-size:11px; color:var(--ink-soft)}
  .rstat{margin-left:auto; text-align:right; font-size:11px; min-width:52px}
  .tag{display:inline-block; padding:1px 8px; border-radius:20px; font-size:11px; font-weight:600}
  .tag.ok{background:color-mix(in srgb,var(--c-jade) 22%,transparent); color:var(--c-jade)}
  .tag.hurt{background:color-mix(in srgb,var(--gold) 28%,transparent); color:var(--amber)}
  .tag.crit{background:color-mix(in srgb,var(--cinnabar) 22%,transparent); color:var(--cinnabar)}
  .tag.dead{background:var(--line); color:var(--ink-soft)}
  .roster li.gone .rname{text-decoration:line-through; color:var(--ink-soft)}

  .think{display:flex; flex-direction:column; gap:9px; padding:3px}
  .trow{display:flex; gap:8px; opacity:.5; transition:opacity .3s}
  .trow.live{opacity:1}
  .tdot{flex:none; width:23px; height:23px; border-radius:50%; display:grid; place-items:center; font-family:var(--disp); font-size:12px; color:#fbf4e3; text-shadow:0 1px 1px rgba(0,0,0,.5); margin-top:1px}
  .ttext{font-size:12.5px; line-height:1.5}
  .ttext .who{font-weight:600; font-family:var(--disp)}
  .tempty{font-size:12.5px; color:var(--ink-soft); padding:10px}

  .transport{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px 14px; display:flex; flex-direction:column; gap:11px; box-shadow:var(--shadow)}
  .tline1{display:flex; align-items:center; gap:8px 16px; flex-wrap:wrap}
  .clock{font-family:var(--disp); font-size:22px; font-weight:600}
  .clock .shichen{color:var(--cinnabar)}
  .phase{font-size:12px; color:var(--ink-soft); letter-spacing:.1em}
  .survtag{font-size:12px; color:var(--ink-soft); margin-left:auto}
  .survtag b{color:var(--ink); font-family:var(--disp); font-size:16px}
  .tickno{font-family:var(--mono); font-variant-numeric:tabular-nums; font-size:12px; color:var(--ink-soft)}

  .ctrls{display:flex; align-items:center; gap:9px; flex-wrap:wrap}
  button.ct{font-family:var(--ui); font-size:13px; color:var(--ink); background:var(--panel-2); border:1px solid var(--line-2); border-radius:8px; padding:7px 12px; cursor:pointer; transition:background .15s, transform .08s}
  button.ct:hover{background:color-mix(in srgb,var(--gold) 16%,var(--panel-2))}
  button.ct:active{transform:translateY(1px)}
  button.play{min-width:92px; font-weight:600}
  .spd{display:flex; gap:3px}
  .spd button{padding:6px 9px; font-size:12px}
  .spd button[aria-pressed="true"]{background:color-mix(in srgb,var(--gold) 30%,var(--panel-2)); border-color:var(--gold)}

  .track{position:relative; height:26px; flex:1 1 200px; min-width:170px}
  input.seek{position:absolute; inset:0; width:100%; height:100%; margin:0; opacity:0; cursor:pointer; z-index:4}
  .rail{position:absolute; left:0; right:0; top:11px; height:5px; border-radius:3px; background:var(--line-2)}
  .fill{position:absolute; left:0; top:11px; height:5px; border-radius:3px; background:linear-gradient(90deg,var(--gold),var(--cinnabar))}
  .knob{position:absolute; top:5px; width:16px; height:16px; border-radius:50%; background:var(--ink); border:2px solid var(--panel); transform:translateX(-50%); z-index:2}
  .mark{position:absolute; top:-2px; transform:translateX(-50%); font-size:12px; z-index:1}

  .legend{display:flex; flex-wrap:wrap; gap:5px 15px; font-size:11px; color:var(--ink-soft)}
  .legend span{display:inline-flex; align-items:center; gap:5px}
  .legend i{width:11px; height:11px; border-radius:50%; display:inline-block}

  :focus-visible{outline:2px solid var(--gold); outline-offset:2px; border-radius:6px}
  @media (prefers-reduced-motion:reduce){
    .piece,.bubble,.slash,.flash.on,.lantern,.basin,.stone{animation:none!important}
    .piece{transition:transform .2s}
  }
  .foot{font-size:11.5px; color:var(--ink-soft); text-align:center; line-height:1.7}
  .foot b{color:var(--ink)}
</style>

<div class="jh">
 <div class="wrap">
  <header class="head">
   <h1 class="title"><span class="sub">TRUMAN · 生成式代理箱庭</span>衡山城 · 劉正風金盆洗手</h1>
   <p class="kicker">六個 AI 各懷心事，被放進同一天。沒有劇本推動——<b>費彬</b>當眾殺了劉正風，再把在場的人一個個清掉。這是那一天的實錄回放。</p>
  </header>

  <div class="board-row">
   <div class="stagewrap" id="stage">
    <canvas class="board" id="board"></canvas>
    <div class="layer" id="props"></div>
    <div class="layer" id="pieces"></div>
    <div class="layer" id="fx"></div>
    <div class="flash" id="flash"></div>
   </div>

   <aside class="side">
    <div class="card">
     <h3>六人 · 上帝視角</h3>
     <div class="body"><ul class="roster" id="roster"></ul></div>
    </div>
    <div class="card">
     <h3>此刻心裡話</h3>
     <div class="body"><div class="think" id="think"></div></div>
    </div>
   </aside>
  </div>

  <div class="transport">
   <div class="tline1">
    <div class="clock" id="clock">—</div>
    <div class="phase" id="phase"></div>
    <div class="survtag">尚在人世 <b id="surv">6</b> / 6</div>
   </div>
   <div class="ctrls">
    <button class="ct play" id="play">▶ 播放</button>
    <button class="ct" id="step-b" aria-label="上一刻">‹</button>
    <button class="ct" id="step-f" aria-label="下一刻">›</button>
    <div class="spd" role="group" aria-label="播放速度">
     <button class="ct" data-spd="1">1×</button>
     <button class="ct" data-spd="2" aria-pressed="true">2×</button>
     <button class="ct" data-spd="4">4×</button>
    </div>
    <div class="track" id="track">
     <div class="rail"></div><div class="fill" id="fill"></div><div class="knob" id="knob"></div>
     <input class="seek" id="seek" type="range" min="0" max="96" value="0" aria-label="時間軸">
    </div>
    <div class="tickno" id="tickno">tick 0</div>
   </div>
   <div class="legend" id="legend"></div>
  </div>

  <p class="foot">
   資料為 <b>gemini-3.1-flash-lite</b> 實跑一整個模擬日（96 個決策時刻、每刻 10 分鐘）的完整事件日誌，離線確定性重放，零 API 呼叫。
   人物取自金庸《笑傲江湖》；武功數值只是模擬設定。棋子落定，江湖如局。
  </p>
 </div>
</div>

":true,"thought":"大清早費彬就來了，嵩山派果然盯得緊。客氣話得先說，免得落人口實，只要平安過了今日，一切都好說。"},"fei_bin":{"x":3,"y":4,"area":"長街","wound":0,"alive":true,"thought":"劉正風這老傢伙倒是客氣，不過我可不是來喝茶的。先把腳步跨進劉府大廳，這局勢才好掌握。"},"linghu_chong":{"x":13,"y":2,"area":"長街","wound":0,"alive":true,"thought":"一大早的，劉府那邊估計已經熱鬧起來了，先去街上逛逛，看看能不能找壇好酒暖暖身子。"},"yi_lin":{"x":17,"y":10,"area":"長街","wound":0,"alive":true,"thought":"這裡冷清清的，一個人待著真怕。師父她們應該都去劉府賀禮了吧，我得趕快去跟師父會合才行。"},"tian_boguang":{"x":13,"y":12,"area":"長街","wound":0,"alive":true,"thought":"曲洋那老頭在城外待著，正好，省得被他瞧見。我得去城裡轉轉，把那小尼姑找出來才是正經事。"},"qu_yang":{"x":12,"y":14,"area":"荒祠","wound":0,"alive":true,"thought":"田伯光這傢伙怎麼會在群玉院？若他在城內搗亂，只怕會壞了正風的好事。我得遠遠避著，決不能讓這渾人發現我的蹤跡，更不能讓正道盯上我。"}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費師兄早，嵩山派遠道而來，劉某未曾遠迎，還請見諒。廳內已備好茶水，師兄請入內稍作歇息。"}]},{"tick":1,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"這費彬來得真早，既然他還在長街，我就先在門口候著，展現足夠的禮數，不讓他們有一丁點藉口在我的大典上找茬。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true},"linghu_chong":{"x":11,"y":2,"area":"市集","wound":0,"alive":true},"yi_lin":{"x":14,"y":10,"area":"群玉院","wound":0,"alive":true},"tian_boguang":{"x":13,"y":9,"area":"群玉院","wound":0,"alive":true,"thought":"嘖，這小尼姑怎麼往演武場那邊去了？那裡現在全是臭道士和正道人士，下手極其不方便，我得想辦法把她引出來。"},"qu_yang":{"x":12,"y":14,"area":"荒祠","wound":0,"alive":true,"thought":"田伯光這採花賊怎麼也來湊熱鬧？他若在劉賢弟金盆洗手之際生事，後果不堪設想。我得盯緊這傢伙，但萬萬不能與他正面照面，免得引火燒身。"}},"events":[]},{"tick":2,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"費彬這大清早的就到了，還盯得這麼緊，看來嵩山派是不打算讓我安安靜靜地退隱。我得繼續維持這份客氣，讓他挑不出半點理來。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風這老狐狸裝得一臉和氣，我看你能裝到什麼時候。先敷衍幾句，等時機到了，我要當眾揭開他那層皮。"},"linghu_chong":{"x":11,"y":2,"area":"市集","wound":0,"alive":true,"thought":"大清早的，劉三爺那兒肯定淨是些假客套，不如先在市集尋摸點酒喝，暖暖身子再說。"},"yi_lin":{"x":13,"y":8,"area":"長街","wound":0,"alive":true},"tian_boguang":{"x":13,"y":7,"area":"演武場","wound":0,"alive":true},"qu_yang":{"x":15,"y":14,"area":"長街","wound":0,"alive":true,"thought":"田伯光那淫賊不知打什麼主意，若他在今日生事，正風的苦心就全毀了。我必須進城，遠遠地盯著這傢伙，萬一他要動手，我也得想辦法暗中化解，絕不能讓他壞了今日的大典。"}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費師兄，今日府中人多雜亂，若有招待不周之處，還請多多包涵。裡邊請。"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉三爺客氣了。我這趟來，是帶著盟主的賀禮，也有些盟主交代的私話要跟三爺單獨談談，不知三爺可有閒暇？"},{"kind":"interact","agent":"linghu_chong","obj":"在賣雜貨的攤位間閒逛，順便打聽有沒有什麼窖藏的好酒。"}]},{"tick":3,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"該來的終究會來，他這麼早就想談，肯定沒什麼好事。但在金盆洗手前，我絕不能露出破綻，只能先虛與委蛇，盡量往後拖。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這老小子在裝傻，避重就輕，想把我和他那些賓客隔開。好，既然你不想私下談，那我就在大庭廣眾之下讓你難堪，看你這金盆還洗得下去洗不下去。"},"linghu_chong":{"x":11,"y":2,"area":"市集","wound":0,"alive":true},"yi_lin":{"x":13,"y":8,"area":"長街","wound":0,"alive":true,"thought":"是田伯光！大家都說他是採花大盜，可怕極了，我絕對不能讓他帶路，得趕快避開他。"},"tian_boguang":{"x":13,"y":7,"area":"演武場","wound":0,"alive":true,"thought":"這小尼姑往演武場走，那裡人多眼雜，還有個華山派的小子。我得先把她哄到沒人的地方，硬來肯定不行。"},"qu_yang":{"x":18,"y":14,"area":"長街","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費師兄言重了。今日府上賓客陸續抵達，劉某身為主人，實在分身乏術。不如等大典過後，劉某再備酒菜向師兄請教？"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"三爺說笑了，都是江湖同道，哪來什麼招待不周。不過盟主交代的事情事關重大，既然這裡不便，那就等稍後儀式開始前，我再找機會跟三爺討教，到時候可別避而不見啊。"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"yi_lin","text":"這位小師父，我看妳走得匆忙，是迷路了嗎？我是過路的，這衡山城路可難走得很，要不要我帶妳一程？"},{"kind":"speech","agent":"yi_lin","name":"儀琳","to":"tian_boguang","text":"多謝施主好意，不過小尼姑已經認得路了，就不勞施主費心。"}]},{"tick":4,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"這費彬步步進逼，若是讓他攪亂了大典前的節奏，後果不堪設想。我得表現得滴水不漏，順著他的話說，但絕不給他私下單獨談話的縫隙。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這老狐狸想用拖字訣？今天這金盆要是讓他洗成了，我和嵩山派的臉往哪擱。我不能讓他太順心，先給他點壓力。"},"linghu_chong":{"x":11,"y":5,"area":"演武場","wound":0,"alive":true,"thought":"嘖，田伯光這傢伙怎麼混進來的？這可是衡山城，他膽子未免也太大了點。要是讓旁人認出來，這金盆洗手大典怕是要見血了。"},"yi_lin":{"x":13,"y":7,"area":"演武場","wound":0,"alive":true,"thought":"他居然沒對我怎麼樣，真是嚇死我了。雖然他說的話聽起來客氣，但我絕對不能掉以輕心，趕緊離開他身邊才是最要緊的。"},"tian_boguang":{"x":13,"y":7,"area":"演武場","wound":0,"alive":true,"thought":"嘖，這小尼姑居然這麼不給面子，不過看她那副怯生生的樣子，倒也可愛。不能急，得換個法子讓她放鬆戒心，不然她一喊人，這演武場上的正道人士全都要圍過來了。"},"qu_yang":{"x":20,"y":13,"area":"長街","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費師兄言重了，既然是盟主所託，劉某豈敢怠慢？只是今日賓客眾多，劉某實在走不開。不如待大典吉時一過，我立馬洗手退隱，屆時定當恭候師兄大駕，好好聽聽盟主的訓示，如何？"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉三爺，大典之後自然是要敘敘的。不過這江湖上的規矩，有些話該說在前頭。要是耽誤了吉時，到時候怪罪下來，我費彬可擔當不起，還請三爺好自為之。"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"yi_lin","text":"小師父說哪裡話，瞧妳這麼客氣，反倒是我唐突了。我這人平生最敬重佛門中人，既然妳認得路，那我就不打擾了。只是這城裡今日人多雜亂，小師父自己小心點便是。"},{"kind":"reflection","agent":"fei_bin","insight":"劉正風刻意以『主人忙於招待』為藉口迴避私下交談，這顯示他非常清楚我此行的目的，且心裡有鬼。"}]},{"tick":5,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"這費彬果然沒那麼好打發，話裡話外都透著股威脅，看來今天是想在洗手前逼我就範。不過只要我死咬著吉時不放，眾目睽睽之下他也不敢太過分。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這廝還在跟我打官腔，想把事情拖到金盆洗手之後。看來得直接給他點顏色瞧瞧，不能再任由他拖延下去了。"},"linghu_chong":{"x":11,"y":5,"area":"演武場","wound":0,"alive":true,"thought":"田伯光這傢伙又在打什麼鬼主意，對儀琳這麼客氣，準沒好事。我得先插進去，不然儀琳那丫頭肯定要吃虧。"},"yi_lin":{"x":10,"y":7,"area":"演武場","wound":0,"alive":true,"thought":"那個可怕的田伯光怎麼還在那裡？他剛剛那樣對我說話，眼神真的很嚇人，我一定要離他遠一點。對了，那位華山派的令狐沖公子看起來很面善，或許他可以幫我。"},"tian_boguang":{"x":13,"y":7,"area":"演武場","wound":0,"alive":true,"thought":"令狐沖這小子真是陰魂不散，偏偏選在這時候認出我來，小尼姑聽到了肯定更提防。先跟他打個馬虎眼，別讓他攪了我的局。"},"qu_yang":{"x":20,"y":10,"area":"城隍廟","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費師兄言重了。劉某退隱之心已決，這金盆洗手大典對我意義非凡，斷不敢有誤。師兄若有指教，且容我忙完眼前的瑣事，大典之後，無論刀山火海，劉某都候著。"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉師弟，盟主的大事刻不容緩，豈能等到你洗手之後？今日我就要在這大廳之上，當著各位賓客的面，與你好好『談談』你那位老友的事。"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"喲，這不是萬里獨行田兄嗎？今日劉三爺金盆洗手，這兒可是正道英雄聚會，田兄怎麼也來湊這個熱鬧？也不怕被人拆了骨頭去？"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐兄說笑了，我不過是來湊湊熱鬧，見識一下劉三爺的風采，順便做個買賣，只要沒人惹我，我也懶得生事，你說是吧？"},{"kind":"reflection","agent":"liu_zhengfeng","insight":"費彬這次來者不善，他口中的「盟主交代」多半就是阻撓我退隱，甚至可能帶著動手的密令。"},{"kind":"reflection","agent":"tian_boguang","insight":"儀琳這小尼姑雖然面皮嫩，心裡防備重得很，想靠幾句好話就把她哄走，是不可能的。"}]},{"tick":6,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"這費彬果然按捺不住了，竟想在大庭廣眾之下挑明曲大哥的事，想壞我大典。我絕不能接這話茬，必須把話題硬生生轉回金盆洗手這樁正事上，只要拖到吉時，誰也別想在劉府生事。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這老狐狸滿嘴拖延，還想用退隱來搪塞盟主之命。既然人越來越多，我乾脆直接撕開他的假面具，讓他沒法子洗手。"},"linghu_chong":{"x":11,"y":5,"area":"演武場","wound":0,"alive":true,"thought":"田伯光這傢伙說得冠冕堂皇，誰信他。他對儀琳那個態度肯定是不懷好意，我得把他引走，不能讓他在這大庭廣眾之下糾纏恆山派的小師父。"},"yi_lin":{"x":7,"y":7,"area":"演武場","wound":0,"alive":true,"thought":"糟了，怎麼又是那個可怕的採花賊田伯光！他要是想對我動手，令狐沖公子能救我嗎？我一定要躲到令狐公子身後去，千萬不能被田伯光抓到。"},"tian_boguang":{"x":13,"y":7,"area":"演武場","wound":0,"alive":true,"thought":"這小子真是陰魂不散，看來不把他打發走，我是沒法動那小尼姑的。得想個法子激將他，或者把他引開。"},"qu_yang":{"x":20,"y":7,"area":"城門","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費師兄，今日是我劉某金盆洗手的大日子，賓客盈門，有什麼盟主交代的大事，不妨等儀式過後再談。正所謂開弓沒有回頭箭，這金盆在此，洗手過後我便是個閒人，屆時再聽費師兄賜教也不遲。"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉三爺，什麼大典之後？這金盆今日你是洗不了了。我這有些消息，若是抖出來，只怕全場賓客都要驚掉下巴，你說，這戲還演得下去嗎？"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這話說得倒是有趣，既然如此，何不隨我到迴雁樓喝上一杯？那兒酒香，也沒那麼多正道大俠盯著你。"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐兄，這演武場人多嘈雜，沒什麼好瞧的。聽說迴雁樓的猴兒酒不錯，敢不敢跟我去喝兩杯？還是怕我這『萬里獨行』半路把你吃了？"},{"kind":"reflection","agent":"yi_lin","insight":"田伯光雖然江湖名聲極惡，但我獨自遇到他時他卻未立刻動手，這人城府極深，不能僅憑表面的客氣就掉以輕心。"}]},{"tick":7,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"費彬這廝居然想在大庭廣眾下挑破，真是步步緊逼，不能讓他在這裡發難，得先將他穩住，絕不能讓他當眾說出曲大哥的事。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這老小子滿口官腔，居然想把這事拖到洗手之後。再跟他廢話下去，等他洗完手成了「閒人」，盟主的任務我就全砸了，現在就得撕破他的臉。"},"linghu_chong":{"x":11,"y":5,"area":"演武場","wound":0,"alive":true,"thought":"這傢伙居然自己提去迴雁樓，這正是引開他的好機會。只要離開這人多眼雜的演武場，儀琳小師父就安全多了，至於這場鴻門宴，我倒要看看他想玩什麼花樣。"},"yi_lin":{"x":4,"y":7,"area":"長街","wound":0,"alive":true},"tian_boguang":{"x":15,"y":6,"area":"長街","wound":0,"alive":true,"thought":"這小子倒是上鉤得快，這下就能把他支開，儀琳那邊就沒人護著了。先把令狐沖灌醉或者拖住，正事要緊。"},"qu_yang":{"x":17,"y":7,"area":"長街","wound":0,"alive":true,"thought":"已進城了，街上人多，只要低著頭便沒人會注意到。現在得趕快穿過長街，混進市集，找個角落觀察動靜，決不能讓這身分惹出麻煩。"}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費師兄，今日是我劉正風金盆洗手的大日子，各位前輩好友都在，有什麼事，請等我禮成之後，劉某必會給盟主、給費師兄一個交代，何必急於一時？"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉師弟，不必這麼多客套話。你金盆洗手是假，想要藉此掩蓋勾結魔教曲洋的真面目才是真。今日我不妨把話挑明，你洗這盆手，洗得乾淨嗎？"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這話激得好，我令狐沖要是怕了你，以後也不必在江湖上混了。走，喝酒去，我倒要看看這猴兒酒能不能灌醉你這萬里獨行。"},{"kind":"reflection","agent":"linghu_chong","insight":"田伯光這賊禿對儀琳小師父絕對圖謀不軌，他出現在劉府絕非湊熱鬧，而是衝著小尼姑來的。"}]},{"tick":8,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"這費彬果然按捺不住，竟在眾目睽睽之下挑明了，若我不強硬回應，大典必亂。我得咬死這是栽贓，將這盆髒水潑回去，拖到吉時才是正道。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這劉正風滿口仁義禮智，字字句句都在拖延，想用那套江湖規矩來壓我。我不能再讓他拖下去了，今日若讓他順利洗手，左盟主那邊我沒法交代，現在就得當眾揭穿他的真面目。"},"linghu_chong":{"x":14,"y":5,"area":"長街","wound":0,"alive":true,"thought":"這裡人多口雜，要是真打起來，非但劉三爺的金盆洗手會被攪亂，儀琳那小尼姑恐怕也逃不了。這田伯光說要去迴雁樓喝酒，正合我意，先把這煞星引開，其他的走一步看一步。"},"yi_lin":{"x":3,"y":5,"area":"長街","wound":0,"alive":true},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true},"qu_yang":{"x":14,"y":7,"area":"長街","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費師兄，這話可不能亂說！我劉正風行走江湖數十載，行事坦蕩，今日金盆洗手乃是為了歸隱山林，你憑空捏造這等魔教勾結的罪名，莫非是存心攪亂我衡山派大典？若是沒有憑據，還請師兄自重！"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉三爺，什麼禮成之後？今日我奉盟主之命前來，就是要問你：你私下與魔教長老曲洋勾結，這筆帳，難道也要等洗了手再算嗎？"},{"kind":"reflection","agent":"fei_bin","insight":"當眾拋出『曲洋』之名，劉正風雖試圖維持鎮定，但眼神明顯閃爍，這證明他與魔教勾結之事確有其事，且是他最大的軟肋。"}]},{"tick":9,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"這廝真是沒完沒了，非要在這大庭廣眾之下挑破，擺明了就是要攪黃我的大典。不能順著他的話頭自亂陣腳，一定要把話題拉回到大典的莊嚴性上，讓旁人覺得他是在搗亂。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這老狐狸到了這時候還在裝模作樣，想用『沒憑據』三個字就把我打發了？既然他要憑據，我就當著全場賓客的面，把曲洋的琴譜和那點破事抖出來，看他這洗手大典還辦不辦得下去！"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田伯光雖然是個採花賊，但這時候引他去迴雁樓喝酒，總比讓他待在演武場惹出亂子好。我也得小心應付，這傢伙刀法快，真喝醉了未必安全。"},"yi_lin":{"x":5,"y":5,"area":"演武場","wound":0,"alive":true,"thought":"費師兄居然在大庭廣眾之下指控劉三爺勾結魔教，這若是打起來，我萬萬抵擋不住。我武功低微，現在湊到劉府門口太危險了，還是先去演武場找令狐沖公子比較保險。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"令狐沖這小子真的一步步跟我過來了，正好。這樓上沒外人，把他灌醉或激走，儀琳那邊就沒人護著了。"},"qu_yang":{"x":11,"y":7,"area":"演武場","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費賢弟，今日是我劉正風金盆洗手的大日子，高朋滿座，我衡山派的大事方為重。你要談私事，大典之後我定當奉陪，但若要在這洗手盆前胡攪蠻纏、攪亂禮儀，只怕在場的武林同道也不會答應。"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉三爺，你當真以為做得滴水不漏？你私下與魔教長老曲洋來往密切，琴簫合奏，這可是證據確鑿！今日在場的都是江湖好漢，你勾結魔教、置五嶽劍派大義於不顧，這金盆你洗得下去嗎？"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐兄果然豪爽！快請，這酒錢我包了，今天不醉不歸！"},{"kind":"reflection","agent":"liu_zhengfeng","insight":"費彬已經徹底撕破臉，他不是來「談判」的，而是鐵了心要在此毀掉大典、置我於死地，任何妥協都沒用了。"}]},{"tick":10,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"費彬這是鐵了心要在此刻壞我大典，讓我在眾賓客面前身敗名裂。但我現在決不能露怯，越是這種時候，越要表現得問心無愧，用儀式壓住局勢，否則真要打起來，我一家老小如何自處？"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風這老狐狸，想用「禮數」來壓我。越是眾人看著，他越是怕我把曲洋的事抖出來。這滿堂賓客都在等，若現在不發難，等他洗完手成了閒人，盟主的大計就泡湯了。我要把水徹底攪渾，當眾撕開他的偽裝。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這廝真是陰魂不散，但迴雁樓清靜些，至少不會讓劉三爺的洗手禮毀在我們手上。先跟他喝著，看看能不能找機會灌醉他，或是問出他想對儀琳小師父做什麼。"},"yi_lin":{"x":8,"y":5,"area":"演武場","wound":0,"alive":true,"thought":"劉府那邊爭執得好兇，費彬語氣咄咄逼人，若是真的動起手來，我這點微末功夫肯定躲不過，還是先離開這裡為妙。令狐公子說不定在迴雁樓，我得趕快去那裡找他，或者看看能不能打聽到師父的消息。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子果然跟過來了，只要把他灌醉，或者讓他喝到渾身發軟，這衡山城裡就沒人能壞我的好事。"},"qu_yang":{"x":11,"y":4,"area":"長街","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費師兄，今日是我劉某金盆洗手之大喜日子。是非曲直，大典之後我自有交代。賓客眾多，還請費師兄給衡山派一個薄面，莫要在此喧嘩。"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉師兄好大的排場，一句「禮儀」就想蓋過與魔教長老曲洋私通的大罪？今日在座的武林同道，是來喝你的喜酒，還是來給你這「金盆洗手」的魔教走狗做見證的？"},{"kind":"interact","agent":"linghu_chong","obj":"與田伯光在樓上桌邊坐下，點一罈酒，開始寒暄拖延時間。"},{"kind":"interact","agent":"tian_boguang","obj":"點幾壺迴雁樓最好的烈酒，叫小二把酒送上來，跟令狐沖對飲。"}]},{"tick":11,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"費彬想激我動手，只要我先拔劍，這罪名就坐實了。他越是想在大庭廣眾下逼我難堪，我越不能如他意，今天這洗手禮，我要一步步走完，看他敢不敢在眾目睽睽下當眾殺人。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這劉正風果然是老狐狸，一直用『賓客面子』和『大典禮儀』來壓我。我若再退讓，盟主交代的事就徹底黃了，現在正是時候把那層遮羞布徹底撕下來。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true},"yi_lin":{"x":11,"y":5,"area":"演武場","wound":0,"alive":true},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true},"qu_yang":{"x":11,"y":3,"area":"市集","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費師兄，劉某今日金盆洗手，這盆水是給江湖看的，也是給五嶽劍派一個交代。劉某行事向來坦蕩，若師兄執意要在這良辰吉日挑起門派爭端，那是你的事，但這盆手，我是洗定了。"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉師兄，好一個『自有交代』！可你勾結魔教長老曲洋，這種大逆不道之事，難道還要等洗了手、做了閒人，再慢慢去跟那魔頭交代嗎？我看這金盆不是給你洗手的，是給你洗掉那一身骯髒勾當的吧！"}]},{"tick":12,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"這廝得寸進尺，字字句句都在逼我當場認罪。若我此刻與他爭辯，反而正中下懷，拖延了大典時間，我必須立刻表明大典照常進行，無視他的挑釁。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風這老狐狸，想拿『名分』和『規矩』壓我，讓我大典後再說。他那眼神一閃，分明是心虛，我若再退，這事就真洗白了。我不能再讓他拖，就在現在，當著所有賓客的面，把他和魔教長老勾結的事實直接捅破，看他怎麼收場。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田伯光眼睛毒得很，要是讓他瞧見樓下儀琳師妹走過來，這場戲就演不下去了。得趕緊讓他專心在酒杯上，多喝幾碗最好。"},"yi_lin":{"x":11,"y":5,"area":"演武場","wound":0,"alive":true},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"令狐沖這小子真不知死活，居然真敢跟我坐一桌。儀琳小師太要上樓了，我得想辦法讓他別多管閒事，或者乾脆把他支開。"},"qu_yang":{"x":11,"y":3,"area":"市集","wound":0,"alive":true,"thought":"那田伯光竟然與令狐沖在迴雁樓對飲？這華山派的小輩怎麼跟這採花賊攪在一塊兒了。儀琳小師太正往那邊走，她那單純性子，進了賊窩哪有命在？我不能現身，但也不能眼睜睜看著她去送死。"}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":"fei_bin","text":"費師兄，劉某今日金盆洗手，志在退隱，不問世事。無論劉某與曲洋是何交情，那是我私人的事，與五嶽劍派無關，與今日大典無關。這金盆，我是洗定了。"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉三爺好大的口氣！什麼金盆洗手、什麼坦蕩，難道這就是你勾結魔教長老曲洋的交代？今日在場的五嶽同道都在，我倒要問問，你是要把這雙沾滿魔教血腥的手洗乾淨，還是乾脆要把衡山派也帶去給魔教當走狗？"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄，這一罈哪夠？迴雁樓這酒雖烈，但也不過如此，再叫兩罈，今日定要喝得痛快！"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐賢弟，你這酒量確實不錯。不過我看樓下好像有些熱鬧，聽說恆山派的小師太也來了，你華山派大弟子不下去接應一下嗎？"},{"kind":"reflection","agent":"fei_bin","insight":"劉正風死守『大典之後再談』的藉口，證明他深知只要洗手禮成，以『退休』之身就能規避盟主追究，因此拖延就是他當前最大的防禦手段。"},{"kind":"reflection","agent":"tian_boguang","insight":"令狐沖雖然是正道中人，但這小子酒量好、膽子大，願意跟我同桌，只要把這小子灌醉或纏住，他在這我就沒法動手，但也能藉機把他從儀琳身邊調開。"}]},{"tick":13,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"這費彬越說越猖狂，試圖把衡山派也拖下水，我絕不能在他這節奏裡打轉，得趕緊向大眾宣佈大典開始，把這場洗手戲做實了，他才沒藉口動手。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這傢伙終於自己承認與曲洋有勾當了，真是天助我也。這下不需要什麼證據，只要我當眾把這層窗戶紙捅破，看他還有什麼臉面洗手。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田伯光賊心不死，眼角一直往樓下瞄。絕不能讓他現在下樓看到儀琳，得想個法子把他繼續拴在酒桌上。"},"yi_lin":{"x":14,"y":5,"area":"長街","wound":0,"alive":true,"thought":"糟了，田伯光這惡賊怎麼會知道我在這，還跟令狐公子提起我？我得趕緊進樓，雖然跟田伯光在一起很危險，但令狐公子若在，這惡賊多少會有忌憚，師父不在，我只能指望令狐公子了。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子真是不要命了，看來只要有酒，他連儀琳在哪都不顧了，正好讓我能騰出手來。"},"qu_yang":{"x":14,"y":3,"area":"長街","wound":0,"alive":true,"thought":"那小尼姑真要上樓，我若現身阻攔便會暴露行蹤，只能先跟上去，看看有沒有機會提醒她，或者找個地方暗中觀察情況。"}},"events":[{"kind":"speech","agent":"liu_zhengfeng","name":"劉正風","to":null,"text":"各位賓客，今日劉某金盆洗手，只想求個清靜。費師兄若有指教，待劉某退隱之後再談。吉時已到，大典開始！"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"好個『私人的事』！劉正風，你勾結魔教長老曲洋，圖謀不軌，這可是與魔教狼狽為奸的滔天大罪，竟然還妄想金盆洗手退出江湖？今日滿座武林同道在此，你若要洗手，就先問問這天下英雄答不答應！"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這話就見外了，恆山派師太武功高強，哪需我接應？倒是這猴兒酒，剛才那一罈太小，不如我們賭一賭，看誰先喝完這兩罈，輸的請客，如何？"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐賢弟果然豪氣！既是如此，老闆！再拿三罈好酒上來，今日我不把賢弟喝倒，就不叫萬里獨行！"},{"kind":"reflection","agent":"liu_zhengfeng","insight":"費彬今日鐵了心要在此地動手，他已不再在意是否會當眾翻臉，甚至連儀式的體面都不顧了。"}]},{"tick":14,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"費彬這混帳，話說得越毒，越說明嵩山派怕我真的洗手退隱，不能讓他得逞，先把手伸進去才是正道。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這老小子居然想跟我玩拖字訣，還想在大庭廣眾之下把禮給成了？做夢。現在不打斷他，左盟主那邊我沒法交代，一定要讓這盆水潑不下去。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這廝賊心不死，還想著儀琳小師父。酒已經上了，那就繼續喝，只要拖住他不讓他下樓，儀琳就暫時安全。"},"yi_lin":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"真的是田伯光那個惡賊！他居然跟令狐沖公子在一起喝酒，我這時候要是冒然過去，會不會惹惱了田伯光？可是除了令狐公子，我也沒別的靠山了，只能先躲在角落觀察。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子真是不要命了，想跟我比酒量？正好，他既然自己要喝，我就陪他喝到吐，省得他老在那礙事。"},"qu_yang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這丫頭真是不知天高地厚，竟往賊窩裡鑽。令狐沖這小子在玩火，我不能露面，但也不能看著這恆山小尼姑遭殃，只能想辦法把她騙開。"}},"events":[{"kind":"interact","agent":"liu_zhengfeng","obj":"端起金盆，準備洗手"},{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉師兄，且慢！左盟主有令，這金盆洗手之事，怕是不能隨你心願。你若真身家清白，何必怕我當眾說穿你與魔教長老曲洋的勾當？"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄，喝酒講究的是意興！你這人好端端的提什麼小尼姑，掃興！來，你說今日要分出高下，這三罈子酒，誰先放下，誰就是龜兒子，敢不敢賭？"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐兄果然爽快！既然你有心比試，那我田某奉陪到底。小二，再拿兩壇最烈的燒刀子來！若是我輸了，這迴雁樓今天隨你點，我全包了！"},{"kind":"interact","agent":"liu_zhengfeng","obj":"深吸一口氣，不理會費彬，雙手直接伸進金盆洗手。"},{"kind":"reflection","agent":"linghu_chong","insight":"田伯光這廝雖無賴，但極重江湖名聲，只要拿「萬里獨行」的面子壓他，他為了證明本事，絕不肯輕易離席。"},{"kind":"reflection","agent":"yi_lin","insight":"令狐沖公子雖然心地善良，但他竟然與田伯光這惡賊稱兄道弟、飲酒作樂，江湖上的善惡界線似乎不像師父教導的那樣黑白分明。"}]},{"tick":15,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"費彬果然沉不住氣了，只要我手沾了水，禮成便是事實，到時候看他還能怎麼鬧。不能停，一停這戲就演不下去了。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這姓劉的竟然想無視我的警告，簡直狂妄至極。這盆水洗下去，他的魔教勾當就成了『私事』，絕不能讓他得逞，現在就揭穿他！"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田禿子真是個酒罈子，不過他越想拚酒，儀琳就越安全。我現在腦袋已經有點沉了，得想辦法把話鋒岔開，免得真喝倒了誤事。"},"yi_lin":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"曲洋老先生說得雖然客氣，但我現在若離開了令狐公子，萬一被田伯光盯上怎麼辦？不行，我得裝作沒聽見，或者找個藉口待在令狐公子身邊，這裡至少有令狐公子護著。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子酒興真好，中了我的激將法還渾然不覺。既然他主動送上門要拼命喝，我就陪他喝到底，我看他醉倒了還怎麼護著那小尼姑。"},"qu_yang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這兩個年輕人喝瘋了，田伯光那賊子眼裡只有酒跟賭約，倒是有機可乘。我得想辦法讓這傻尼姑離這賊遠點，若能讓她知難而退下樓去最好，決不能讓她待在田伯光這畜生旁邊。"}},"events":[{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉師弟，且慢！你私通魔教長老曲洋，這件事難道也想洗個手就一筆勾銷嗎？今日你不給五嶽劍派一個交代，這盆水，你洗不下去！"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄好氣魄！不過這迴雁樓的酒哪能包得住你「萬里獨行」的胃口？這兩壇燒刀子我接了，只是喝完這兩壇，咱們也別只比酒量，不如聊聊江湖上最近聽來的奇聞，如何？"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"好！令狐兄弟果然痛快。三罈哪夠？既然要賭，就玩大的，這一排全算上，誰先倒下誰就是孫子！"},{"kind":"speech","agent":"qu_yang","name":"曲洋","to":"yi_lin","text":"這位小師父，我看這樓上酒氣衝天，怕是有些是非，不如妳還是早些下樓找個清靜處，免得耽誤了妳的修行。"},{"kind":"interact","agent":"liu_zhengfeng","obj":"深吸一口氣，無視費彬的叫囂，將雙手穩穩地浸入金盆之中，宣告金盆洗手。"},{"kind":"speech","agent":"yi_lin","name":"儀琳","to":"qu_yang","text":"多謝老先生好意，只是我這就下樓怕是又要迷路，令狐公子是華山派的前輩，我……我想在這裡稍候片刻，等這桌酒席散了，再向他討教尋師之法。"},{"kind":"reflection","agent":"qu_yang","insight":"令狐沖看似沉溺於酒色與賭局，實則在暗中牽制田伯光，這華山小子的城府與膽識比我想像中深。"}]},{"tick":16,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"這費彬果然按捺不住，非要當眾將那層遮羞布扯破。我心已定，今日這盆水哪怕是刀山火海，我也洗定了。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"該死，他竟然真的敢當眾洗手！我就算拼著這張臉不要，今天也絕不能讓他洗成，必須立刻打斷他！"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田禿子喝瘋了，再來這排下去我肯定先倒。得先把儀琳這傻丫頭支開，這樓上太危險，那老頭子看著倒是個明白人。"},"yi_lin":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"曲老先生說得有道理，這兒確實不是我該待的地方，但要是令狐公子也覺得我該走，那我再離開也不遲。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"令狐沖這小子真是不見棺材不掉淚，喝得這麼猛還想聊天。那老頭曲洋多管閒事想支走儀琳，哼，只要令狐沖這杯酒喝下去，我就不信他還能護得住這小尼姑。"},"qu_yang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小尼姑太過天真，田伯光這種惡徒，豈會守什麼比酒規矩？若令狐沖真喝醉了，這迴雁樓就是她的牢籠。我不能直接勸走她，得用這小尼姑聽得進去的話，讓她趕緊離開這險地。"}},"events":[{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉賢弟，慢著！勾結魔教長老曲洋，意圖叛出五嶽劍派，這等大罪，你也想靠洗個手就洗得乾乾淨淨嗎？"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄好氣魄！不過這酒喝得急了沒意思。儀琳小師父，這樓上酒氣衝天，確實吵雜，既然這位老先生這般說，妳何不先下樓去，我在這兒陪田兄喝完這幾罈，待會兒再去找妳？"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐兄，酒桌上哪有不喝酒只聊天的？這兩壇酒先下肚，要是你能喝完還面不改色，我田伯光認輸，屆時什麼奇聞異事我隨便你聊。來，這杯先乾了！"},{"kind":"speech","agent":"qu_yang","name":"曲洋","to":"yi_lin","text":"小師太，佛家講究隨緣，你既是出家人，在這煙花酒肆流連恐壞了清修，引來不必要的紅塵因果。我看這兩位比鬥凶險，不如妳先去樓下走走，若真迷了路，門口隨便問個路人便是，莫要在此久留。"},{"kind":"interact","agent":"liu_zhengfeng","obj":"深吸一口氣，無視費彬，將雙手穩穩浸入金盆之中，正式執行金盆洗手大禮。"},{"kind":"speech","agent":"yi_lin","name":"儀琳","to":"linghu_chong","text":"令狐公子，這位老先生勸我先行離開，說此地兇險。公子覺得呢？我是不是該下樓避一避？"},{"kind":"reflection","agent":"tian_boguang","insight":"令狐沖這小子雖然武功不差，但貪杯成性，只要酒夠多，他根本顧不上那恆山派的小尼姑。"}]},{"tick":17,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":0,"alive":true,"thought":"這廝真是沒完沒了，若是開口與他辯解，反倒顯得我心虛，正中了他拖延時間、坐實我勾結魔教之罪的下懷。只要這水沾了手，便是脫離江湖的第一步，絕不能此時停手。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"這老傢伙竟然當我不存在，還真敢把手伸進去！絕對不能讓他洗手，一旦洗成，我就成了衡山城的笑話了。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"曲洋這老頭看起來不像是隨便開口的人，這會兒支走儀琳反倒是幫了大忙。先把儀琳哄走，我才能專心對付田伯光這個狂徒。"},"yi_lin":{"x":13,"y":4,"area":"長街","wound":0,"alive":true,"thought":"令狐公子讓我走，肯定是為我好，但他跟田伯光這惡賊待在一起太危險了，我心裡好慌。但我武功這麼低，待在這裡只會讓他分心，還是聽話先走吧，希望他能平安無事。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這兩個人一搭一唱的，是想把儀琳送走？門都沒有。這小尼姑要是跑了，我今天這場戲還怎麼唱下去？得把她留下，或者至少讓令狐沖覺得留下沒什麼大不了的。"},"qu_yang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"令狐沖這小子在拖延時間，但我不能再捲進去，儀琳這小尼姑太單純，必須讓她趕快離開這個是非之地，以免待會刀劍無眼傷了她。"}},"events":[{"kind":"speech","agent":"fei_bin","name":"費彬","to":"liu_zhengfeng","text":"劉師弟，好大的膽子！曲洋那魔頭與你勾結之事尚未交代清楚，你竟敢當著天下英雄的面金盆洗手？這盆水，你洗得下去嗎！"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"yi_lin","text":"儀琳小師妹，這位老前輩說得極是，這酒桌上酒氣沖天，確實不是清修之地，你且先下樓避一避，若有什麼事，我隨後便到，莫要在此受了驚嚇。"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"yi_lin","text":"儀琳師父，這樓下市集人多混雜，反倒不如這兒清淨。令狐兄酒量海涵，我這兒還有幾罈好酒，咱們三人同飲，哪來什麼兇險？妳若信不過我，就把令狐兄當個護衛，有他在這兒，妳還怕什麼？"},{"kind":"speech","agent":"qu_yang","name":"曲洋","to":"yi_lin","text":"小師父，修佛之人當遠離戾氣，此處酒肉薰天，更有江湖敗類在此，不是清修之所。令狐少俠自有脫身之策，妳且速速下樓，莫要在此看這些粗鄙之事。"},{"kind":"interact","agent":"liu_zhengfeng","obj":"深吸一口氣，無視費彬的叫囂，將雙手穩穩浸入金盆之中，正式進行洗手大禮。"},{"kind":"reflection","agent":"linghu_chong","insight":"拖住田伯光這種淫賊，靠刀劍不如靠他的好勝心跟酒興，這傢伙只要有名聲跟酒，就能被牽著鼻子走。"},{"kind":"reflection","agent":"yi_lin","insight":"田伯光試圖留住我，顯然是想拿我當籌碼或威脅令狐公子，待在他們身邊反而成了危險的源頭。"}]},{"tick":18,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":2,"alive":true},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"竟敢無視我直接動手？這老賊是鐵了心要硬扛，絕不能讓他完成這儀式！"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"曲洋這老頭說得對，這裡確實不是儀琳該待的地方。田伯光這賊禿想拿我當藉口來留住她，我得趕緊把儀琳哄走，再想辦法對付這田禿子。"},"yi_lin":{"x":13,"y":4,"area":"長街","wound":0,"alive":true,"thought":"令狐公子這是在催我走，他一定是要跟田伯光這惡人動手了，我留在這裡只會讓他分心，雖然心裡好擔心，但我不能給他添亂。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這令狐沖和曲洋一搭一唱，想把小尼姑支開，沒門。我得想辦法攪局，或者乾脆先把令狐沖這小子灌得動彈不得，讓他沒工夫管閒事。"},"qu_yang":{"x":14,"y":3,"area":"長街","wound":0,"alive":true,"thought":"令狐沖這小子果然聰明，這話說得得體，既順著我的意思勸了儀琳，又沒落了田伯光的面子。儀琳這孩子聽了令狐沖的話，想必會走，我不宜久留，這地方遲早要亂。"}},"events":[{"kind":"attack","agent":"fei_bin","target":"liu_zhengfeng","line":"費彬向劉正風下手，劉正風受了重傷。","margin":4},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"yi_lin","text":"儀琳師妹，這位曲老先生說得有理，這迴雁樓確實污濁不堪。你快下樓去吧，這田兄的酒我還要再喝幾杯，這兒沒你的事，快走！"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐賢弟，這話就不對了。儀琳小師父既然來了，哪有這般趕客的道理？美酒當前，咱們還沒分出高下，你這就想讓小師父走，未免太不把我田某人放在眼裡了吧？"},{"kind":"speech","agent":"yi_lin","name":"儀琳","to":"linghu_chong","text":"令狐公子，那您……您千萬要保重，儀琳在城中等您，您一定要平安過來找我。"},{"kind":"reflection","agent":"liu_zhengfeng","insight":"費彬已經徹底撕破臉，他根本不在乎江湖規矩或賓客眼光，我的『名聲護身符』已經完全失效，現在就是你死我活的局面。"},{"kind":"reflection","agent":"fei_bin","insight":"劉正風這類愛惜羽毛的偽君子，唯有在他最得意的儀式上直接給予致命一擊，才能徹底撕碎他那層遮羞布。"}]},{"tick":19,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false,"thought":"洗手大典已經徹底毀了，費彬這狗賊絕不會讓我活著離開。與其在這裡耗盡最後一口氣，不如趁著現在還沒斷氣，立刻帶家人從後門撤走。"},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"洗手了？在我眼皮子底下還敢裝模作樣！這金盆我非砸了不可，看你這手還能洗到哪去。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"田伯光這賊子皮笑肉不笑，分明盯著儀琳不放，還在那裝模作樣講什麼規矩。這小尼姑單純，我得先讓她趕緊走，免得待會動起手來傷了她。"},"yi_lin":{"x":13,"y":5,"area":"演武場","wound":0,"alive":true,"thought":"這惡賊果然不懷好意，定是想利用我來威脅令狐公子，我絕不能停下腳步，更不能回話，免得讓他有機可乘。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子想把那小尼姑支開，沒那麼容易。曲洋這老頭跟著攪和，我得先把話說死，讓小尼姑別急著跑，免得我煮熟的鴨子飛了。"},"qu_yang":{"x":17,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"看來儀琳這小姑娘總算聽勸要走了，令狐沖這小子雖然酒氣衝天，腦子倒還清醒，正在盡力護著這小尼姑。我這把老骨頭既然已經露了面，最好別再多嘴，趕緊離這是非之地越遠越好，省得被田伯光那淫賊認出身份來。"}},"events":[{"kind":"attack","agent":"fei_bin","target":"liu_zhengfeng","line":"費彬向劉正風下手，劉正風倒了下去，沒再起來。","margin":4},{"kind":"death","agent":"liu_zhengfeng","name":"劉正風","killed_by":"fei_bin"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄，你這話可就傷感情了，小師父是出家人，哪能跟咱們在這廝混？既然你想喝，這壇酒我陪你喝到底，只要你沒趴下，我令狐沖就絕不離席，如何？"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"yi_lin","text":"小師父且慢！令狐兄這話可就傷人了，什麼叫污濁不堪？這迴雁樓的好酒好菜，可是我特意款待令狐兄的，妳這時候走，豈不是說我不懂待客之道？"},{"kind":"reflection","agent":"qu_yang","insight":"令狐沖這小子與一般華山弟子不同，他心思機敏，能在田伯光這種惡徒面前周旋且不露怯，是個值得留意的人物。"}]},{"tick":20,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"死透了。也好，省得廢話。現在滿堂賓客都在看著，這戲演得夠足了，得趕緊把這「清理門戶」的名頭給落實了，省得有人敢給劉正風出頭。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"田伯光這賊禿真是死纏爛打，竟然連一句話都不肯放儀琳走。這酒不喝不行，我得用言語再激他一激，讓他以為我是真想跟他喝個痛快，好讓他死心留在這桌上。"},"yi_lin":{"x":10,"y":5,"area":"演武場","wound":0,"alive":true,"thought":"令狐公子為了掩護我離開，不惜自己涉險與田伯光這惡賊對峙。我留在這裡只會讓公子分心，必須趕快去劉府找師父，或許師父能有辦法救公子。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這令狐沖酒量雖好，但他這話說得太死，簡直是把自己的命送上酒桌。既然他要硬碰硬，我索性就把這酒桌當戰場，等他醉得人事不知，儀琳那小尼姑還不是手到擒來。"},"qu_yang":{"x":19,"y":4,"area":"長街","wound":0,"alive":true,"thought":"這兩人在這糾纏酒局，正好幫我掩護，令狐沖這小子有點意思，但這裡不是久留之地。還是趁田伯光注意力都在酒上，趕緊溜去城隍廟。"}},"events":[{"kind":"speech","agent":"fei_bin","name":"費彬","to":null,"text":"諸位同道，劉正風勾結魔教妖人曲洋，鐵證如山，為禍武林。我嵩山派奉盟主號令，行的是清理門戶的大義，若有誰想為此等魔教走狗叫屈，不妨站出來，我費某人一併領教！"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這話說的，難道你還怕我令狐沖會溜了不成？儀琳師妹是出家人，這酒樓的酒氣和你的殺氣太重，會熏著她。這樣吧，只要你把眼前這壺酒乾了，我就陪你喝到底，如何？"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"好！令狐兄弟果然爽快！既然是你親口說的，那今日咱們不醉不歸。小師父妳也別急著走，且坐下看我們喝個痛快，免得日後說我田某人欺負你們華山派酒量不行。"},{"kind":"reflection","agent":"tian_boguang","insight":"令狐沖這小子吃軟不吃硬，只要不斷激他的酒量，他為了面子定會拼到底，這是灌倒他最快的路。"}]},{"tick":21,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風這老狐狸終於死了。現在得趁著滿堂賓客還沒回過神，把這盆髒水徹底潑實，誰敢有異議，下場就跟他一樣。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田禿子真是死纏爛打，看來這酒桌不把他灌趴下或者惹毛他是沒法善了。得找個理由讓儀琳師妹先走，這酒局我一個人接了。"},"yi_lin":{"x":7,"y":5,"area":"演武場","wound":0,"alive":true},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子真是敬酒不吃吃罰酒，既然他自己找死要喝，那我就成全他。等他醉得像灘爛泥，那個小尼姑還不是隨我處置？"},"qu_yang":{"x":19,"y":7,"area":"長街","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"fei_bin","name":"費彬","to":null,"text":"諸位武林同道，今日我費彬清理門戶，乃是奉了左盟主之令。劉正風勾結魔教妖人曲洋，意圖顛覆五嶽劍派，如今罪有應得，死有餘辜！誰若要為他求情，便是與我嵩山派、與五嶽劍派為敵，儘管站出來！"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄，喝酒嘛，人多吵雜反倒掃興。儀琳師妹不懂喝酒，看著咱們喝也沒意思。這樣吧，只要你答應我別去煩她，這兩壇酒，我令狐沖一個人喝了，若我不醉倒，算我輸，咱們再比過！"},{"kind":"interact","agent":"tian_boguang","obj":"拿起桌上的酒壇一飲而盡，把酒碗重重磕在桌上"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐賢侄，這話可是你說的！今日若不把你這華山派的大弟子灌得鑽桌底，我這「萬里獨行」四個字就倒過來寫。來，滿上！"},{"kind":"reflection","agent":"linghu_chong","insight":"田伯光雖然好色且為非作歹，但他這人極重江湖名聲與勝負心，只要一直用他『萬里獨行』的身分與勝負來激他，就能暫時栓住他，不讓他下樓去追儀琳。"}]},{"tick":22,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風這老賊已經死透了。那小尼姑還敢過來，不過無妨，現在大局已定，正好趁著人多，把這勾結魔教的罪名當眾宣讀，震懾在場這些搖擺不定的廢物。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這賊禿果然上鉤了，只要他還想著贏我，儀琳就有機會走。我得再拚幾碗，順便哄他幾句，讓他徹底放下對儀琳的念頭，至少讓他覺得為了個尼姑壞了鬥酒的興致不划算。"},"yi_lin":{"x":4,"y":5,"area":"長街","wound":0,"alive":true},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子酒量確實不錯，但我已經看出他眼神開始渙散，舌頭也有些打結了，再多灌幾杯他肯定倒。"},"qu_yang":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"fei_bin","name":"費彬","to":null,"text":"劉正風勾結魔教曲洋，背棄正道，罪大惡極！今日我嵩山派替天行道，斬此奸邪，凡是與其勾結者，便是我嵩山派的敵人！"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這話說得好氣魄！不過今日這酒可不能白喝，田兄若是輸了，那『萬里獨行』的名號雖然不用倒著寫，但總得答應我個條件。至於儀琳小師父，她留這兒看咱們喝多掃興？不如讓她先走，咱們兄弟喝個痛快！"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐兄弟，剛才那杯是你自己說要乾的，怎麼，現在想耍賴了？來，我們再滿上，這壺陳年花雕若是喝不完，豈不是浪費了這迴雁樓的好酒？"}]},{"tick":23,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風這條命已經收了，大功告成。殺雞儆猴，這滿屋子的賓客想必都看清楚了，用不著跟這小尼姑廢話。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田禿子喝得起勁，正好趁現在再灌他兩杯，拖住他的心思，只要他不下樓，小師妹就有活路。得裝作喝得開懷，別讓他看出我腳步已經不穩了。"},"yi_lin":{"x":7,"y":5,"area":"演武場","wound":0,"alive":true,"thought":"劉三爺竟然死了……費彬這人心狠手辣，我絕不能讓他發現我在這裡，趕快走，離這可怕的地方越遠越好！"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子主動要把儀琳支開？正好，省得我還要想辦法調虎離山。先讓小尼姑走，等這姓令的喝個夠，我再收拾他也不遲。"},"qu_yang":{"x":16,"y":9,"area":"長街","wound":0,"alive":true,"thought":"這裡離劉府不遠，但也不算近，先往荒祠那邊去看看，那裡夠偏僻，適合做為最後的撤退點，若劉賢弟那邊真出了事，我在那裡也比較好掩人耳目。"}},"events":[{"kind":"interact","agent":"fei_bin","obj":"冷冷地看著地上的屍體，慢條斯理地將劍上的血跡擦拭乾淨。"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這話就見外了，我是怕酒喝光了，你這萬里獨行的好酒量沒得展現，豈不讓人笑話？來，倒上，再喝！"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐兄果然爽快！這條件我答應了。小師父，既然令狐兄這麼說，妳就先下樓去吧，免得在這裡看兩個粗人喝酒壞了妳的清淨。來，令狐兄，咱們接著喝！"}]},{"tick":24,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"田伯光這淫賊居然這麼乾脆放人，出乎意料，不過只要儀琳能先走，我的目的就達到了。現在只能繼續跟他拼酒，拖得越久越好，看能不能找到破綻，或者等這酒勁上來讓他失手。"},"yi_lin":{"x":7,"y":5,"area":"演武場","wound":0,"alive":true},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子酒量真不錯，看來還沒喝夠。既然他這麼急著討醉，我就再給他加把火，只要他倒下，那儀琳就是甕中之鱉。"},"qu_yang":{"x":16,"y":9,"area":"長街","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄果然痛快！說話算話，儀琳師妹，妳快走，這裡風沙大，不適合小師父待。田兄，來，咱們把這罈酒乾了，誰先倒下誰就是輸！"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐賢弟果然好海量！既然你想聊，咱們就一邊聊一邊喝。這一大碗敬你，看看是你的華山劍法快，還是我的酒量快！"},{"kind":"reflection","agent":"yi_lin","insight":"嵩山派費彬那樣的『正道』高手，為了鏟除異己，殺人毫不手軟，比那些江湖惡賊更令我恐懼，這世道根本沒有絕對的善惡之分。"},{"kind":"reflection","agent":"tian_boguang","insight":"令狐沖這小子酒量確實深不可測，他跟我鬥酒並非單純貪杯，而是在用華山派弟子的身分跟我死磕，想用這場酒局拖住我。"}]},{"tick":25,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":5,"y":4,"area":"長街","wound":0,"alive":true,"thought":"劉正風已經死透了，留在這滿地血腥的地方沒什麼意思。不如去演武場逛逛，把這老傢伙勾結魔教的事說得更清楚些，讓這群人徹底死心，斷了替衡山派出頭的念頭。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"太好了，儀琳小師妹已經脫身了，這田禿子雖然狂妄，倒也言而有信。現在我沒了後顧之憂，可以放心和他玩玩這場『酒局』，看看到底是他刀快還是我劍快。"},"yi_lin":{"x":10,"y":5,"area":"演武場","wound":0,"alive":true,"thought":"剛剛才聽到劉府那邊傳來慘叫，費彬那種人簡直太可怕了，我絕對不能再往那個方向走。市集人多眼雜，希望能平安混過去，找個地方躲起來等師父。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子還真敢跟我硬碰硬，既然你想喝死，我就成全你。再灌幾碗，我看你這華山首徒還怎麼挺得住。"},"qu_yang":{"x":14,"y":13,"area":"長街","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這話說得倒是有趣，華山劍法講究的是一個快字，喝酒嘛……那我可就不讓了。來，這碗我乾了，田兄可別慢了！"},{"kind":"interact","agent":"tian_boguang","obj":"與令狐沖拚酒，大口喝下這罈酒。"},{"kind":"interact","agent":"tian_boguang","obj":"大口喝下剛滿上的酒，然後把空碗重重磕在桌上，挑釁地看著令狐沖"},{"kind":"reflection","agent":"linghu_chong","insight":"對付田伯光這種狂人，硬碰硬不如跟他玩「無賴戰術」，只要抓準他「萬里獨行」的好勝心與虛名，就能讓他乖乖聽話，這比跟我拼刀省力多了。"}]},{"tick":26,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":5,"y":5,"area":"演武場","wound":0,"alive":true},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田禿子已經不耐煩了，眼看儀琳往城隍廟跑，我得再拿話激他一激，讓他留在這，反正我也沒打算這酒能喝贏他。"},"yi_lin":{"x":13,"y":5,"area":"演武場","wound":0,"alive":true},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子酒量是不錯，但眼神已經開始飄了。既然他要跟我比，那我就陪他喝到底，看他那張華山派的臉還能掛多久。"},"qu_yang":{"x":14,"y":14,"area":"荒祠","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄，你這碗乾得快，但酒量嘛，我看未必比得上你那快刀。怎麼，怕我不成？再來！"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"哈哈，好一個華山派首徒！怕你？你若是能贏我這一碗，今天這酒錢我包了，還送你幾壇好酒。再來！"}]},{"tick":27,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":4,"area":"長街","wound":0,"alive":true,"thought":"劉正風已經死透了，這事辦得乾淨。現在這些賓客都成了驚弓之鳥，正好給他們一點顏色瞧瞧，省得有人日後想替魔教餘孽翻案。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"田伯光這賊禿喝得興起，只要他還想爭這口氣，我就能繼續耗著。儀琳往城隍廟的方向去了，只要拖住田伯光不讓他下樓，她就能安全脫身。"},"yi_lin":{"x":16,"y":5,"area":"長街","wound":0,"alive":true,"thought":"令狐公子正在和那個惡賊喝酒，我絕不能過去打擾，否則只會拖累他。一定要去城隍廟，趕快避開這些是非之地。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子果然中計，為了所謂華山派的名聲，連命都不要了。只要他還在這跟我拚酒，那小尼姑就沒人護著，隨我怎麼拿捏。"},"qu_yang":{"x":14,"y":14,"area":"荒祠","wound":0,"alive":true,"thought":"這荒祠雖然破敗，但位置偏僻且視野開闊，正好可以讓我掩人耳目地窺探城中動靜。劉賢弟的大典就在這兩個時辰內，我必須守在這，靜待時機，不能輕舉妄動。"}},"events":[{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"好！田兄果然爽快，這碗酒我若是不喝，倒顯得我華山派沒氣量。來，滿上！"},{"kind":"interact","agent":"qu_yang","obj":"在荒祠的廢棄供桌旁坐下，擦拭懷中的琴囊，假裝是個路過歇腳的琴師。"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"哈哈，好！令狐兄果然是條漢子，這才是華山派該有的氣概！來，再滿上，今天不醉不歸！"}]},{"tick":28,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田禿子喝得正高興，只要再灌他幾碗，他就想不起來那小尼姑剛才已經溜了。得想辦法讓他繼續坐著喝，這酒喝下去雖然燒胃，但至少這傢伙不會去禍害儀琳。"},"yi_lin":{"x":19,"y":5,"area":"長街","wound":0,"alive":true,"thought":"田伯光這惡賊真是陰魂不散，他是想用這種法子拖住令狐公子嗎？我再說什麼都會被他利用，不如別理他，直接走，離得越遠越好。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"嘖，這小尼姑竟然要跑？儀琳一走，令狐沖這小子沒了後顧之憂，恐怕就不會再跟我這麽老實拚酒了。得趕緊先留住這小尼姑，或者乾脆讓令狐沖先斷了這心思。"},"qu_yang":{"x":14,"y":14,"area":"荒祠","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這話說得好！咱們練武之人，喝酒就要喝個痛快。不過我聽人說田兄這『萬里獨行』的名號不只是輕功好，酒量也是千杯不倒。怎麼，剛才那碗酒我看你手抖了一下，莫非是怕了我的華山劍法，連酒杯都端不穩了？再來！"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"yi_lin","text":"小師太，這麼急著走做什麼？我跟令狐兄這酒還沒喝完呢，妳師父要是問起，妳就說是我田伯光拉著華山派大弟子比酒，誰也別想壞了興致。"}]},{"tick":29,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風這偽君子終於死了，死得好，這下衡山派想翻身也難了。我要讓所有人都看清楚，跟魔教勾結就是這個下場。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田禿子真是賊心不死，明明是想抓小師妹，卻拿我當擋箭牌。不行，絕不能讓他離開這桌子去追人，我得繼續拿他『萬里獨行』的名聲激他，讓他覺得現在贏我才是頭等大事。"},"yi_lin":{"x":19,"y":8,"area":"長街","wound":0,"alive":true},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子以為在跟我比酒量，其實是在試探我的定力。儀琳已經往城隍廟方向走，不能再跟他磨蹭了，得找個理由把他灌倒，或者把他引開，讓那小尼姑沒人保護。"},"qu_yang":{"x":13,"y":12,"area":"長街","wound":0,"alive":true,"thought":"荒祠離劉府太遠，若是賢弟那邊真出了什麼變故，我連消息都傳不出來。得往劉府周遭挪挪，演武場人多眼雜，我扮個賣藝的或看熱鬧的，想必也不會引人注目。"}},"events":[{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這話就不對了，儀琳小師父是出家人，哪能跟咱們在這兒耗？還是說田兄怕喝不過我，才非得拉個人質壯膽？來，咱們接著喝，這杯酒你要是不敢乾，那以後『萬里獨行』的名號，還是換成『萬里膽小』吧。"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐兄弟說笑了，我田某人縱橫江湖多年，這點酒算什麼？剛才只是看樓下那小尼姑走得匆忙，怕她迷路，倒沒留心酒杯。來，再來一壇，咱們喝個痛快，看誰先倒下！"},{"kind":"reflection","agent":"fei_bin","insight":"劉正風當眾被殺，卻無一人敢拔劍相助，證明江湖賓客不過是一群貪生怕死的鼠輩，只要刀夠快、殺意夠絕，所謂的正義與交情根本不堪一擊。"}]},{"tick":30,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風這偽君子終於斷了氣，現在最重要的是讓在場所有人清楚，誰敢收這具魔教走狗的屍體，就是跟嵩山派、跟盟主作對。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這傢伙真是個酒桶，不過他的眼光還盯著樓下，我得把這酒局的火再燒旺點，讓他覺得贏過我才是頭等大事。只要他還想著跟我鬥酒，儀琳就多一分逃脫的機會。"},"yi_lin":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子竟然用激將法，還要趕儀琳走？看來他是想支開我或者保護那小尼姑。不過既然他非要找死，那我就成全他，先把他灌趴下再說。"},"qu_yang":{"x":13,"y":9,"area":"群玉院","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"fei_bin","name":"費彬","to":null,"text":"劉正風勾結魔教長老曲洋，罪大惡極，證據確鑿！今日我費彬奉五嶽盟主令，誅此叛徒於此。在場諸位英雄好漢，誰要是敢收這叛徒的屍體，便是與魔教同流合污，後果自負！"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄好酒量！佩服佩服。不過你要說這點酒算什麼，我可不信。這酒要是能喝倒你『萬里獨行』，那才是江湖奇聞。來，咱們把這一壇都乾了，看誰先倒下！"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"好小子，激我？我田伯光行走江湖靠的是這身本事，從來沒怕過酒，更沒怕過你華山派那套酸文假醋！儀琳小師父想走便走，我不攔著，但你今天要是喝不倒我，看我不把這桌子給你拆了！滿上！"},{"kind":"reflection","agent":"linghu_chong","insight":"田伯光這種狂人，虛榮心重於色心，只要一直給他「勝負」的餌，他就會像被困住的猛獸，為了證明他是第一，連儀琳這塊到嘴的肥肉都能暫時擱下。"}]},{"tick":31,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風已經死透了，現在正是宣佈他死罪的最好時機，我要讓全場的人都親耳聽見，這就是勾結魔教的下場。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這廝終於上鉤了，想用拆桌子威脅我？哼，只要這酒碗還在，你就別想離開這張桌子去找儀琳麻煩。"},"yi_lin":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true,"thought":"呼……總算暫時脫身了，這裡好安靜，令狐公子他……希望他能平安脫險，別被那田伯光纏住。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子真是敬酒不吃吃罰酒，喝到現在還想跟我拼？既然你要找死，那我就成全你，把你灌到不省人事為止。"},"qu_yang":{"x":13,"y":7,"area":"演武場","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"fei_bin","name":"費彬","to":null,"text":"劉正風勾結魔教，背叛師門，證據確鑿！今日我嵩山派替天行道，清除江湖敗類，若有誰不服，儘管站出來！"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這話說得氣派！拆桌子是小事，但若喝輸了耍賴，那『萬里獨行』的招牌可就砸了。來，小二，上酒！我這就陪田兄喝個痛快！"},{"kind":"interact","agent":"yi_lin","obj":"雙手合十，在城隍爺像前默默念誦清心咒，讓心定下來。"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"好！令狐賢弟果然豪氣。既然你這麼想看我萬里獨行倒下，那這壇酒咱們乾了，誰先軟倒誰就是孫子！"}]},{"tick":32,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風已經是死人了，剩下的衡山派餘孽和這群看熱鬧的廢物，現在最好都給我老實點。得讓他們清楚，這就是勾結魔教的下場。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這廝中了我的激將法，現在他滿腦子只想證明自己喝不倒，只要他還想著這場酒局，就沒空去理會儀琳。"},"yi_lin":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子真能撐，不過看他那晃悠的身影，這是強弩之末了。只要這壇酒喝下去他倒了，那儀琳小尼姑就是我的囊中之物。"},"qu_yang":{"x":16,"y":7,"area":"長街","wound":0,"alive":true,"thought":"演武場人多眼雜，嵩山派的人也在四處盤查，我這身分雖沒被識破，但留在這裡風險太大。去城隍廟轉轉，那裡視野也好，能觀察劉府動靜。"}},"events":[{"kind":"speech","agent":"fei_bin","name":"費彬","to":null,"text":"諸位都看清楚了，劉正風勾結魔教妖人曲洋，意圖顛覆五嶽劍派大義，此乃死罪！今日我費某人替天行道，便是盟主之意，誰若不服，大可站出來試試！"},{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"哈哈，好！不愧是萬里獨行田兄，這壇酒要是能把我也灌倒，那我就真服了你。來，誰先軟倒誰就是孫子，請！"},{"kind":"interact","agent":"tian_boguang","obj":"狂飲烈酒，同時死死盯著令狐沖，看他還能撐多久"},{"kind":"interact","agent":"tian_boguang","obj":"與令狐沖對飲並豪飲最後一壇燒刀子，試圖徹底將他灌醉"},{"kind":"reflection","agent":"tian_boguang","insight":"令狐沖這小子在用「面子」當幌子死命拖住我，他比我想像中更難纏，不能只把他當成普通的華山派酒鬼。"}]},{"tick":33,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"大局已定。劉正風這偽君子已死，衡山派現在就是一盤散沙，量他們也翻不出什麼風浪。我要巡視全場，看看還有哪個不開眼的想來觸我嵩山派的霉頭。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田禿子酒量真是深不見底，再硬喝下去怕是要先醉倒的人是我。得再找個藉口，或者激激他，讓這場賭局繼續下去，只要他還想著在酒桌上贏過我，就不會去管儀琳師妹。"},"yi_lin":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true,"thought":"這人氣度不凡，看起來不像普通的趕路人，也不像是嵩山派的兇神惡煞，但我這身打扮太顯眼，若被認出是恆山派弟子，可能會惹上不必要的麻煩。我不該多說話，先看看他是要來躲雨還是有別的事。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這小子想跟我耍嘴皮子拖時間，好讓酒勁緩緩？想得美。我就不跟他廢話，直接硬灌，看他還能撐多久。"},"qu_yang":{"x":19,"y":7,"area":"長街","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這酒量果然名不虛傳！不過喝酒嘛，光鬥酒多沒意思？不如我們換個法子比比，看看誰能一邊喝酒一邊說出江湖上最離奇的事，說不出的人就罰三碗，如何？"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐賢弟，比什麼奇聞太過文縐縐，喝酒就是喝酒，講究什麼花哨！這最後一壇，你要是不敢乾，就自己認輸，別找那些講故事的藉口！"}]},{"tick":34,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風已經伏誅，剩下的便是這群賓客的表態了。只要我這大嵩陽手還在這裡，誰敢多說一個字，就是自尋死路。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這田禿子耐心快耗盡了，不能再找藉口，乾脆跟他把這最後一壇拼了，只要他醉得腳步不穩，我這把劍才有勝算。"},"yi_lin":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true,"thought":"這老人家看起來不像惡人，但我獨自在外，還是謹慎些好。若他只是路過，我不必驚動他。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"該死，儀琳已經溜到城隍廟了。這小子軟硬不吃，再耗下去也沒意義，既然留不住他，不如直接撇下他去追人，反正我也不怕他追得上。"},"qu_yang":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true}},"events":[{"kind":"speech","agent":"linghu_chong","name":"令狐沖","to":"tian_boguang","text":"田兄這話說得是，令狐沖這就乾了這壇！不過說好，若我喝完了還站得住，這件事咱就翻篇，以後江湖見面，你我各憑本事，如何？"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐賢侄，今日酒興雖好，但我忽然想起還有樁風流韻事要辦，就不陪你繼續在這喝西北風了，告辭！"},{"kind":"reflection","agent":"linghu_chong","insight":"田伯光這淫賊對「萬里獨行」的名號與勝負欲極度執著，只要餵給他「比試」的餌，他就會忘記原本要抓儀琳的目的，這是我現在唯一能拖住他的籌碼。"},{"kind":"reflection","agent":"yi_lin","insight":"曲洋前輩兩次指點我避開爭鬥，且神情泰然，看來並非惡人，我在此處避難或許能暫時獲得指引。"}]},{"tick":35,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風這偽君子已死，事情辦成了。現在只需冷眼看著這些所謂的名門正派，誰若敢露出半點異心，便是下一個目標。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"這廝說要下樓透氣，這分明是想去抓儀琳！他剛才被我偷襲受了傷，現在身手大不如前，絕不能讓他走出這個門。"},"yi_lin":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true,"thought":"曲前輩向我走來了，雖然他不是惡人，但此時這城裡到處都是嵩山派的人，我還是要謹慎些。先請個安，看看能不能從他口中問出師父和令狐公子的消息。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":3,"alive":false,"thought":"這小子真是喝傻了，還想用這種江湖約定綁住我？小尼姑已經跑了，這酒局沒必要再拖，得先讓他分心喝酒，我才有空檔走人。"},"qu_yang":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true,"thought":"這小尼姑真是個惹禍精，要是被她纏上，我的身分遲早暴露，得找個理由讓她離開這是非之地，去找定逸師太會合。"}},"events":[{"kind":"attack","agent":"linghu_chong","target":"tian_boguang","line":"令狐沖向田伯光下手，田伯光掛了彩。","margin":2},{"kind":"speech","agent":"yi_lin","name":"儀琳","to":"qu_yang","text":"曲前輩，晚輩儀琳，又在這兒遇見您了。敢問前輩，如今城中各派師長都在何處？晚輩走散了，心中甚是擔憂。"},{"kind":"speech","agent":"tian_boguang","name":"田伯光","to":"linghu_chong","text":"令狐兄真是好酒量！既然你這麼有信心，那這壇酒你儘管喝，我便信你這一回。我正好去樓下透透氣，等你喝完了，咱們再做計較。"},{"kind":"speech","agent":"qu_yang","name":"曲洋","to":"yi_lin","text":"儀琳小師傅，妳師父她們都在劉府那邊觀禮，正忙著呢。妳一個人落單可不好，快回那邊找她們去吧，這城裡今日人雜，莫要亂走。"},{"kind":"attack","agent":"linghu_chong","target":"tian_boguang","line":"令狐沖向田伯光下手，田伯光倒了下去，沒再起來。","margin":4},{"kind":"death","agent":"tian_boguang","name":"田伯光","killed_by":"linghu_chong"},{"kind":"reflection","agent":"qu_yang","insight":"儀琳這小尼姑雖然心善，但她那毫無戒心的天真樣簡直是麻煩的磁石，幾次三番撞見我，若我繼續對她心軟伸出援手，必會招來嵩山派或其他人的懷疑，這份善意必須適可而止。"}]},{"tick":36,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":3,"y":3,"area":"劉府","wound":0,"alive":true,"thought":"劉正風已經死透了，這衡山派如今群龍無首，也翻不出什麼大浪。在這待著只是看一堆喪家之犬，不如早點回去向盟主覆命，領受功勞。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"呼，這田伯光竟然真的就這麼沒了，這下麻煩了，在這眾目睽睽之下殺了他，恐怕會招來不少嵩山派的閒話。我得先檢查一下自己身上的傷，再看看接下來該怎麼辦，這迴雁樓怕是不能久待了。"},"yi_lin":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true,"thought":"曲前輩讓我回劉府，但我心裡還是很怕嵩山派的人。我該再問得細一點，看現在劉府是不是真如他所說的那樣，真的安全嗎？"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":3,"alive":false},"qu_yang":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true,"thought":"這小尼姑怎麼也躲到這破廟來了，真是不省心。得找個理由讓她離開，不然嵩山派那幫鷹犬指不定哪時候就會追到這來。"}},"events":[{"kind":"interact","agent":"linghu_chong","obj":"檢查自己身上的傷勢"},{"kind":"speech","agent":"yi_lin","name":"儀琳","to":"qu_yang","text":"曲前輩，多謝您指點。只是剛才路過時聽見嵩山派的人語氣不善，劉府那邊...真的不會有事嗎？我武功低微，很怕過去了反而給師父惹麻煩。"},{"kind":"speech","agent":"qu_yang","name":"曲洋","to":"yi_lin","text":"小師太，這荒郊野廟沒什麼香火，若讓恆山派的師長知曉妳獨自在此，怕是要擔憂妳的安危。聽老朽一句，快回妳師父身邊去吧，此地偏僻，可不是清修之所。"}]},{"tick":37,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":6,"y":3,"area":"長街","wound":0,"alive":true,"thought":"劉正風這窩囊廢已經死了，衡山派這回算是廢了。待在這裡看這些賓客的嘴臉也沒意思，先離城去吧。"},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true},"yi_lin":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true,"thought":"曲前輩一直在勸我離開，但他言辭間似乎對劉府那邊的情況很清楚，但我不敢告訴他我怕嵩山派，只能先禮貌回應，探探口風。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":3,"alive":false},"qu_yang":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true,"thought":"這孩子心腸太軟，繼續留在這裡只會讓她深陷泥淖。嵩山派今日來者不善，她這點修為，被捲進去就是粉身碎骨。"}},"events":[{"kind":"speech","agent":"yi_lin","name":"儀琳","to":"qu_yang","text":"曲前輩，多謝您關心。儀琳只是心中有些害怕，劉府今日賓客眾多，又有嵩山派的前輩們在，我若是這樣冒冒失失回去，會不會又惹出什麼事端？"},{"kind":"speech","agent":"qu_yang","name":"曲洋","to":"yi_lin","text":"儀琳小師太，劉府的事非你我能管。今日嵩山派來勢洶洶，你若貿然出現，反而會引來不必要的揣測，讓你師門受累。聽老朽一句，既然已與師長走散，不如先往城外或人少處避一避，莫要再回那是非之地了。"}]},{"tick":38,"agents":{"liu_zhengfeng":{"x":2,"y":2,"area":"劉府","wound":3,"alive":false},"fei_bin":{"x":9,"y":3,"area":"市集","wound":0,"alive":true},"linghu_chong":{"x":15,"y":3,"area":"迴雁樓","wound":0,"alive":true,"thought":"田伯光這惡賊終於死了，但他死在迴雁樓，這麻煩大了。若是被那些名門正派發現是我下的手，怕是又要惹出一堆是非，我得儘快確認傷勢並清理痕跡，趕緊離開這個是非之地。"},"yi_lin":{"x":16,"y":9,"area":"長街","wound":0,"alive":true,"thought":"曲洋前輩一會兒叫我回師父身邊，一會兒又說劉府凶險要我避開，他這是怕我捲進去嗎？但他說的也有道理，我這點本事回劉府反而給師父添麻煩，還是聽他的話去荒祠或是找個安全的地方吧。"},"tian_boguang":{"x":15,"y":3,"area":"迴雁樓","wound":3,"alive":false},"qu_yang":{"x":19,"y":9,"area":"城隍廟","wound":0,"alive":true,"thought":"這小尼姑心思太純，總是被困在對錯糾葛裡。她留在這裡只會更讓旁人起疑，得哄她趕快離開這險地，我也好脫身。"}},"events":[{"kind":"interact","agent":"linghu_chong","obj":"檢查傷勢，並擦拭劍上的血跡，確認沒有留下太明顯的痕跡。"},{"kind":"speech","agent":"qu_yang","name":"曲洋","to":"yi_lin","text":"儀琳師父，你心善是好事，但江湖事不由人心。這裡風大，你也避了一會兒了，快回恆山派長輩身邊去吧，免得他們擔憂。我這老骨頭也該走了。"},{"kind":"reflection","agent":"yi_lin","insight":"曲洋前輩雖然被稱為魔教中人，但他幾次勸導我遠離劉府，心意比起那些殺氣騰騰的嵩山派更 const TILE={

};
const ROOF=new Set(["l","m","t","p","c","z"]);
const board=document.getElementById("board"), bx=board.getContext("2d"), stage=document.getElementById("stage");
let TS=26, DPR=1;
function isDark(){const a=root.getAttribute("data-theme");
  return a==="dark"||(!a&&matchMedia("(prefers-color-scheme:dark)").matches);}
function layout(){
  const cw=stage.clientWidth; DPR=Math.min(2,window.devicePixelRatio||1); TS=cw/W;

  bx.setTransform(DPR,0,0,DPR,0,0);

function h32(x,y){let n=(x*73856093)^(y*19349663);n=(n<0?~n:n)%1009;return n/1009;}
function drawBoard(){
  const P=TILE[isDark()?"dark":"light"], dk=isDark();
  bx.clearRect(0,0,board.width,board.height);
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const sym=ROWS[y][x], px=x*TS, py=y*TS;
    if(sym==="#"){bx.fillStyle=P.wall;bx.fillRect(px,py,TS,TS);bx.fillStyle=P.wallTop;bx.fillRect(px+1,py+1,TS-2,TS*0.4);continue;}
    bx.fillStyle=P[sym]||P["."]; bx.fillRect(px,py,TS,TS);
    const g=h32(x,y);
    bx.fillStyle=`rgba(${dk?"255,255,255":"0,0,0"},${0.03+g*0.05})`; bx.fillRect(px,py+TS*(0.15+g*0.6),TS,1);
    if(ROOF.has(sym)){
      bx.strokeStyle=`rgba(0,0,0,${dk?0.34:0.2})`; bx.lineWidth=1;
      for(let i=1;i<3;i++){bx.beginPath();bx.moveTo(px+2,py+i*TS/3);bx.lineTo(px+TS-2,py+i*TS/3);bx.stroke();}
      bx.fillStyle=`rgba(0,0,0,${dk?0.4:0.24})`; bx.fillRect(px,py+TS/2-0.6,TS,1.4);
      if(sym==="l"){bx.fillStyle="rgba(178,58,46,.55)"; bx.fillRect(px+TS*0.36,py,TS*0.28,TS);}
    } else if(sym==="s"){
      bx.strokeStyle=`rgba(0,0,0,${dk?0.28:0.15})`; bx.lineWidth=1; bx.strokeRect(px+.5,py+.5,TS-1,TS-1);
    } else if(sym==="g"){
      bx.fillStyle=`rgba(0,0,0,${dk?0.5:0.32})`; bx.fillRect(px+TS*0.24,py+TS*0.12,TS*0.52,TS*0.88);
    }
  }
  bx.textAlign="center"; bx.textBaseline="middle";
  bx.font=`${Math.max(10,TS*0.52)}px ${cssv("--disp")}`;
  bx.fillStyle=dk?"rgba(237,227,205,.34)":"rgba(42,37,32,.4)";
  DATA.areas.forEach(a=>bx.fillText(a.name,((a.x0+a.x1)/2+0.5)*TS,((a.y0+a.y1)/2+0.5)*TS));
}

  layProps.innerHTML="";
  const add=(cls,ax,ay)=>{const d=document.createElement("div");d.className="prop "+cls;
    d.style.left=((ax+0.5)*TS)+"px";d.style.top=((ay+0.5)*TS)+"px";layProps.appendChild(d);};
  add("basin",2,2); add("lantern",12,9); add("lantern",14,9); add("lantern",20,6); add("lantern",22,6);
}
const centre=(x,y)=>({cx:(x+0.5)*TS, cy:(y+0.5)*TS});

/* ---------- render ---------- */
let cur=0;
function positionPieces(){
  const sz=Math.round(TS*1.16);
  IDS.forEach(id=>{
    const a=F[cur].agents[id], el=pieceEls[id], {cx,cy}=centre(a.x,a.y);
    el.style.width=el.style.height=sz+"px"; el.querySelector(".stone").style.fontSize=(sz*0.5)+"px";
    el.style.transform=`translate(${cx-sz/2}px, ${cy-sz/2}px)`;
  });
}
function render(t,animate){
  cur=Math.max(0,Math.min(MAXT,t));
  const fr=F[cur];
  positionPieces();
  IDS.forEach(id=>{
    const a=fr.agents[id], el=pieceEls[id];
    el.classList.toggle("dead",!a.alive);
    el.classList.toggle("hurt2",a.alive&&a.wound>=2);
    el.classList.toggle("hurt1",a.alive&&a.wound===1);
    el.classList.toggle("idle",a.alive);
    el.classList.remove("talk");
  });
  [...layFx.querySelectorAll(".bubble,.slash")].forEach(n=>n.remove());
  let hit=false;
  fr.events.forEach(e=>{
    if(e.kind==="speech"){
      const el=pieceEls[e.agent]; if(el)el.classList.add("talk");
      const a=fr.agents[e.agent], {cx,cy}=centre(a.x,a.y), sz=Math.round(TS*1.16);
      const b=document.createElement("div"); b.className="bubble";
      const txt=e.text.length>62?e.text.slice(0,60)+"…":e.text;
      b.innerHTML=`<b>${esc(CAST[e.agent].name)}${e.to&&CAST[e.to]?"→"+esc(CAST[e.to].name):""}：</b>${esc(txt)}`;
      b.style.left=cx+"px";
      if(a.y<=3){ b.classList.add("below"); b.style.top=(cy+sz/2+6)+"px"; }   // 上緣的人（劉府/迴雁樓）氣泡朝下，免得被切掉
      else b.style.top=(cy-sz/2-4)+"px";
      layFx.appendChild(b);
    }else if(e.kind==="attack"&&animate){
      hit=true; slashFx(fr.agents[e.agent],fr.agents[e.target]);
      const tg=pieceEls[e.target]; if(tg){tg.classList.add("shaking"); setTimeout(()=>tg.classList.remove("shaking"),420);}
    }else if(e.kind==="death"&&animate){hit=true;}
  });
  if(hit&&animate&&!reduced()){const fl=document.getElementById("flash"); fl.classList.remove("on"); void fl.offsetWidth; fl.classList.add("on");}
  renderRoster(); renderThink();
  const ck=clock(cur);
  document.getElementById("clock").innerHTML=`${ck.str} <span class="shichen">${ck.sc}時</span>`;
  document.getElementById("phase").textContent=ck.ph;
  document.getElementById("tickno").textContent="tick "+cur;
  document.getElementById("surv").textContent=IDS.filter(id=>fr.agents[id].alive).length;
  document.getElementById("seek").value=cur;
  document.getElementById("fill").style.width=(cur/MAXT*100)+"%";
  document.getElementById("knob").style.left=(cur/MAXT*100)+"%";
}
function slashFx(a,b){
  const A=centre(a.x,a.y),B=centre(b.x,b.y),dx=B.cx-A.cx,dy=B.cy-A.cy,len=Math.hypot(dx,dy)||TS,ang=Math.atan2(dy,dx)*180/Math.PI;
  const s=document.createElement("div"); s.className="slash";
  s.style.left=A.cx+"px"; s.style.top=A.cy+"px"; s.style.width=len+"px"; s.style.transform=`rotate(${ang}deg)`;
  layFx.appendChild(s); setTimeout(()=>s.remove(),480);
}

const rosterEl=document.getElementById("roster");
IDS.forEach(id=>{
  const p=PIECE[id], li=document.createElement("li"); li.dataset.id=id;
  li.innerHTML=`<span class="stone-mini" style="background:${grad(cssv(p.v))}">${p.ch}</span>
    <span><span class="rname">${esc(CAST[id].name)}</span><br><span class="rmeta">${p.sect} · 武功 ${CAST[id].skill}</span></span>
    <span class="rstat"></span>`;
  rosterEl.appendChild(li);
});
function renderRoster(){
  const kb={};
  for(let k=0;k<=cur;k++)F[k].events.forEach(e=>{if(e.kind==="death")kb[e.agent]=e.killed_by;});
  [...rosterEl.children].forEach(li=>{
    const id=li.dataset.id,a=F[cur].agents[id],st=li.querySelector(".rstat");
    li.classList.toggle("gone",!a.alive);
    if(!a.alive)st.innerHTML=`<span class="tag dead">已歿</span><br><span class="rmeta">死於 ${kb[id]?esc(CAST[kb[id]].name):"？"}</span>`;
    else if(a.wound>=2)st.innerHTML=`<span class="tag crit">重傷</span>`;
    else if(a.wound===1)st.innerHTML=`<span class="tag hurt">帶傷</span>`;
    else st.innerHTML=`<span class="tag ok">無傷</span>`;
  });
}
const thinkEl=document.getElementById("think");
function renderThink(){
  const fr=F[cur], liveNow={};
  fr.events.forEach(e=>{if(e.kind==="reflection")liveNow[e.agent]="（想通了）"+e.insight;});
  const rows=[];
  IDS.forEach(id=>{
    if(!fr.agents[id].alive)return;
    let th=null,live=false;
    if(fr.agents[id].thought){th=fr.agents[id].thought;live=true;}
    else for(let k=cur;k>=0;k--){const c=F[k].agents[id]; if(c.thought){th=c.thought;break;}}
    if(liveNow[id]){th=liveNow[id];live=true;}
    if(th)rows.push({id,th,live});
  });
  rows.sort((a,b)=>b.live-a.live);
  thinkEl.innerHTML = rows.length ? rows.map(r=>`
    <div class="trow ${r.live?"live":""}">
      <span class="tdot" style="background:${grad(cssv(PIECE[r.id].v))}">${PIECE[r.id].ch}</span>
      <span class="ttext"><span class="who">${esc(CAST[r.id].name)}</span>　${esc(r.th.length>92?r.th.slice(0,90)+"…":r.th)}</span>
    </div>`).join("") : `<div class="tempty">此刻無人起念。</div>`;
}

/* ---------- transport ---------- */
let playing=false, spd=2, timer=null;
const playBtn=document.getElementById("play");
function setPlay(v){
  playing=v; playBtn.textContent=v?"⏸ 暫停":"▶ 播放";
  if(timer){clearInterval(timer);timer=null;}
  if(v){ if(cur>=MAXT)render(0,false);
    timer=setInterval(()=>{ if(cur>=MAXT){setPlay(false);return;} render(cur+1,true); },900/spd);}
}
playBtn.onclick=()=>setPlay(!playing);
document.getElementById("step-f").onclick=()=>{setPlay(false);render(cur+1,true);};
document.getElementById("step-b").onclick=()=>{setPlay(false);render(cur-1,false);};
document.getElementById("seek").oninput=e=>{setPlay(false);render(+e.target.value,false);};
document.querySelectorAll(".spd button").forEach(b=>b.onclick=()=>{
  spd=+b.dataset.spd; document.querySelectorAll(".spd button").forEach(x=>x.setAttribute("aria-pressed",x===b?"true":"false"));
  if(playing)setPlay(true);
});
addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT")return;
  if(e.key===" "){e.preventDefault();setPlay(!playing);}
  else if(e.key==="ArrowRight"){setPlay(false);render(cur+1,true);}
  else if(e.key==="ArrowLeft"){setPlay(false);render(cur-1,false);}
});
document.getElementById("seek").max=MAXT;
(function marks(){const tr=document.getElementById("track");
  F.forEach(fr=>fr.events.forEach(e=>{if(e.kind==="death"){
    const m=document.createElement("div"); m.className="mark"; m.textContent="💀";
    m.style.left=(fr.tick/MAXT*100)+"%"; m.title=`${e.name}　歿於 ${clock(fr.tick).str}`; tr.appendChild(m);}}));})();
document.getElementById("legend").innerHTML=
  [["--c-jade","衡山"],["--c-iron","嵩山"],["--c-amber","華山"],["--c-rose","恆山"],["--c-crim","獨行"],["--c-purple","魔教"]]
  .map(([v,n])=>`<span><i style="background:${grad(cssv(v))}"></i>${n}</span>`).join("")+`<span>💀 命殞時刻</span>`;

/* ---------- boot & theme ---------- */
function redraw(){layout();drawBoard();placeProps();render(cur,false);}
new ResizeObserver(()=>redraw()).observe(stage);
new MutationObserver(()=>{restyleStones();drawBoard();render(cur,false);}).observe(root,{attributes:true,attributeFilter:["data-theme"]});
matchMedia("(prefers-color-scheme:dark)").addEventListener?.("change",()=>{restyleStones();drawBoard();render(cur,false);});
layout(); drawBoard(); placeProps(); render(0,false);
</script>
